<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK Flash Cards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .search-box {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .search-box input {
            width: 100%;
            max-width: 500px;
            padding: 15px 25px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            transform: scale(1.02);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 10px;
        }

        .card {
            perspective: 1000px;
            height: 250px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .card.highlight {
            transform: scale(1.05);
        }

        .card.highlight .card-inner {
            box-shadow: 0 0 30px 10px rgba(255, 215, 0, 0.8);
        }

        .card.dimmed {
            opacity: 0.3;
            transform: scale(0.95);
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card-front {
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
        }

        .card-back {
            background: linear-gradient(145deg, #ff6b6b, #ee5a5a);
            transform: rotateY(180deg);
            color: white;
        }

        .chinese {
            font-size: 3rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .pinyin {
            font-size: 1.2rem;
            color: #666;
            font-style: italic;
        }

        .vietnamese {
            font-size: 1.5rem;
            text-align: center;
            font-weight: 500;
        }

        .hsk-level {
            position: absolute;
            top: 10px;
            right: 15px;
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .card-back .hsk-level {
            background: rgba(255,255,255,0.3);
        }

        .instruction {
            text-align: center;
            color: rgba(255,255,255,0.8);
            margin-bottom: 20px;
            font-size: 1rem;
        }

        .group {
            margin-bottom: 40px;
        }

        .group-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px 25px;
            background: rgba(255,255,255,0.15);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .group-header:hover {
            background: rgba(255,255,255,0.25);
        }

        .group-header h2 {
            color: white;
            font-size: 1.5rem;
            margin: 0;
        }

        .group-header .count {
            background: rgba(255,255,255,0.3);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .group-header .toggle-icon {
            margin-left: auto;
            font-size: 1.5rem;
            color: white;
            transition: transform 0.3s ease;
        }

        .group.collapsed .toggle-icon {
            transform: rotate(-90deg);
        }

        .group.collapsed .cards-grid {
            display: none;
        }

        .group-header.highlight {
            background: rgba(255, 215, 0, 0.4);
            box-shadow: 0 0 20px 5px rgba(255, 215, 0, 0.5);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .cards-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            
            .card {
                height: 200px;
            }
            
            .chinese {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎴 HSK Flash Cards</h1>
        <p class="instruction">Nhập từ để tìm kiếm • Click vào thẻ để xem nghĩa tiếng Việt</p>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Tìm kiếm từ vựng HSK...">
        </div>
        
        <div id="groupsContainer">
            <!-- Groups will be generated by JavaScript -->
        </div>
    </div>

    <script>
        const hskData = {
            "HSK1": [
                { chinese: "你好", pinyin: "nǐ hǎo", vietnamese: "Xin chào" },
                { chinese: "谢谢", pinyin: "xiè xie", vietnamese: "Cảm ơn" },
                { chinese: "再见", pinyin: "zài jiàn", vietnamese: "Tạm biệt" },
                { chinese: "我", pinyin: "wǒ", vietnamese: "Tôi" },
                { chinese: "你", pinyin: "nǐ", vietnamese: "Bạn" },
                { chinese: "他", pinyin: "tā", vietnamese: "Anh ấy" },
                { chinese: "她", pinyin: "tā", vietnamese: "Cô ấy" },
                { chinese: "是", pinyin: "shì", vietnamese: "Là" },
                { chinese: "不", pinyin: "bù", vietnamese: "Không" },
                { chinese: "很", pinyin: "hěn", vietnamese: "Rất" },
                { chinese: "好", pinyin: "hǎo", vietnamese: "Tốt" },
                { chinese: "爱", pinyin: "ài", vietnamese: "Yêu" },
                { chinese: "中国", pinyin: "zhōng guó", vietnamese: "Trung Quốc" },
                { chinese: "人", pinyin: "rén", vietnamese: "Người" },
                { chinese: "家", pinyin: "jiā", vietnamese: "Nhà, gia đình" }
            ],
            "HSK2": [
                { chinese: "时间", pinyin: "shí jiān", vietnamese: "Thời gian" },
                { chinese: "工作", pinyin: "gōng zuò", vietnamese: "Công việc" },
                { chinese: "学习", pinyin: "xué xí", vietnamese: "Học tập" },
                { chinese: "朋友", pinyin: "péng you", vietnamese: "Bạn bè" },
                { chinese: "快乐", pinyin: "kuài lè", vietnamese: "Vui vẻ" },
                { chinese: "漂亮", pinyin: "piào liang", vietnamese: "Đẹp" },
                { chinese: "帮助", pinyin: "bāng zhù", vietnamese: "Giúp đỡ" },
                { chinese: "问题", pinyin: "wèn tí", vietnamese: "Vấn đề, câu hỏi" },
                { chinese: "准备", pinyin: "zhǔn bèi", vietnamese: "Chuẩn bị" },
                { chinese: "已经", pinyin: "yǐ jīng", vietnamese: "Đã" }
            ],
            "HSK3": [
                { chinese: "经验", pinyin: "jīng yàn", vietnamese: "Kinh nghiệm" },
                { chinese: "环境", pinyin: "huán jìng", vietnamese: "Môi trường" },
                { chinese: "历史", pinyin: "lì shǐ", vietnamese: "Lịch sử" },
                { chinese: "文化", pinyin: "wén huà", vietnamese: "Văn hóa" },
                { chinese: "健康", pinyin: "jiàn kāng", vietnamese: "Sức khỏe" },
                { chinese: "舒服", pinyin: "shū fu", vietnamese: "Thoải mái" },
                { chinese: "努力", pinyin: "nǔ lì", vietnamese: "Nỗ lực" },
                { chinese: "成功", pinyin: "chéng gōng", vietnamese: "Thành công" },
                { chinese: "机会", pinyin: "jī huì", vietnamese: "Cơ hội" },
                { chinese: "重要", pinyin: "zhòng yào", vietnamese: "Quan trọng" }
            ],
            "HSK4": [
                { chinese: "经济", pinyin: "jīng jì", vietnamese: "Kinh tế" },
                { chinese: "科技", pinyin: "kē jì", vietnamese: "Khoa học công nghệ" },
                { chinese: "社会", pinyin: "shè huì", vietnamese: "Xã hội" },
                { chinese: "自然", pinyin: "zì rán", vietnamese: "Tự nhiên" },
                { chinese: "传统", pinyin: "chuán tǒng", vietnamese: "Truyền thống" },
                { chinese: "教育", pinyin: "jiào yù", vietnamese: "Giáo dục" },
                { chinese: "发展", pinyin: "fā zhǎn", vietnamese: "Phát triển" },
                { chinese: "责任", pinyin: "zé rèn", vietnamese: "Trách nhiệm" },
                { chinese: "勇敢", pinyin: "yǒng gǎn", vietnamese: "Dũng cảm" },
                { chinese: "梦想", pinyin: "mèng xiǎng", vietnamese: "Ước mơ" }
            ]
        };

        const groupsContainer = document.getElementById('groupsContainer');
        const searchInput = document.getElementById('searchInput');

        // Generate Groups and Cards
        function generateGroups() {
            groupsContainer.innerHTML = '';
            
            Object.keys(hskData).forEach(level => {
                const words = hskData[level];
                
                const group = document.createElement('div');
                group.className = 'group';
                group.dataset.level = level;
                
                // Group header
                const header = document.createElement('div');
                header.className = 'group-header';
                header.innerHTML = `
                    <h2>📚 ${level}</h2>
                    <span class="count">${words.length} từ</span>
                    <span class="toggle-icon">▼</span>
                `;
                header.addEventListener('click', () => {
                    group.classList.toggle('collapsed');
                });
                
                // Cards grid
                const cardsGrid = document.createElement('div');
                cardsGrid.className = 'cards-grid';
                
                words.forEach((word, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.dataset.level = level;
                    card.dataset.index = index;
                    card.innerHTML = `
                        <div class="card-inner">
                            <div class="card-front">
                                <span class="hsk-level">${level}</span>
                                <div class="chinese">${word.chinese}</div>
                                <div class="pinyin">${word.pinyin}</div>
                            </div>
                            <div class="card-back">
                                <span class="hsk-level">${level}</span>
                                <div class="vietnamese">${word.vietnamese}</div>
                            </div>
                        </div>
                    `;
                    
                    card.addEventListener('click', () => {
                        card.classList.toggle('flipped');
                    });
                    
                    cardsGrid.appendChild(card);
                });
                
                group.appendChild(header);
                group.appendChild(cardsGrid);
                groupsContainer.appendChild(group);
            });
        }

        // Search Function
        function handleSearch() {
            const searchTerm = searchInput.value.toLowerCase().trim();
            const cards = document.querySelectorAll('.card');
            const groups = document.querySelectorAll('.group');
            const headers = document.querySelectorAll('.group-header');
            
            if (searchTerm === '') {
                // Reset all
                cards.forEach(card => {
                    card.classList.remove('highlight', 'dimmed');
                });
                headers.forEach(header => {
                    header.classList.remove('highlight');
                });
                groups.forEach(group => {
                    group.classList.remove('collapsed');
                });
                return;
            }
            
            // Check each group for matches
            groups.forEach(group => {
                const level = group.dataset.level;
                const words = hskData[level];
                const groupCards = group.querySelectorAll('.card');
                const header = group.querySelector('.group-header');
                let hasMatch = false;
                
                groupCards.forEach((card, index) => {
                    const word = words[index];
                    const isMatch = 
                        word.chinese.includes(searchTerm) ||
                        word.pinyin.toLowerCase().includes(searchTerm) ||
                        word.vietnamese.toLowerCase().includes(searchTerm) ||
                        level.toLowerCase().includes(searchTerm);
                    
                    if (isMatch) {
                        card.classList.add('highlight');
                        card.classList.remove('dimmed');
                        hasMatch = true;
                    } else {
                        card.classList.remove('highlight');
                        card.classList.add('dimmed');
                    }
                });
                
                // Highlight group header if has match
                if (hasMatch) {
                    header.classList.add('highlight');
                    group.classList.remove('collapsed');
                } else {
                    header.classList.remove('highlight');
                }
            });
        }

        // Event Listeners
        searchInput.addEventListener('input', handleSearch);

        // Initialize
        generateGroups();
    </script>
</body>
</html>
